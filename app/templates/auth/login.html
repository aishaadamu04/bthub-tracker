<!DOCTYPE html>
<html>
  <head>
    <title>Login</title>
  </head>
  <body>
    {% extends "base.html" %} {% block title %}Login{% endblock %} {% block
    content %}
    <div class="max-w-md mx-auto px-4 py-16">
      <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Login</h1>

      {% for error in errors %}
      <p class="bg-red-50 text-red-700 text-sm px-4 py-2 rounded-md mb-2">
        {{ error }}
      </p>
      {% endfor %}

      <form
        method="POST"
        class="bg-white border border-gray-200 rounded-lg p-6 shadow-sm space-y-4"
      >
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Email or Username</label
          >
          <input
            type="text"
            name="identifier"
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Password</label
          >
          <input
            type="password"
            name="password"
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >I am a:</label
          >
          <select
            name="user_type"
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option value="">-- Select --</option>
            <option value="parent">Parent</option>
            <option value="child">Child</option>
          </select>
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 text-white font-medium py-2 rounded-md hover:bg-blue-700"
        >
          Login
        </button>
      </form>

      <p class="text-sm text-gray-600 text-center mt-4">
        No account?
        <a href="/auth/register/parent" class="text-blue-600 hover:underline"
          >Register as Parent</a
        >
        |
        <a href="/auth/register/child" class="text-blue-600 hover:underline"
          >Register as Child</a
        >
      </p>
    </div>
    {% endblock %}
  </body>
</html>
