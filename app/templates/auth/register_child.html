<!DOCTYPE html>
<html>
  <head>
    <title>Child Registration</title>
  </head>
  <body>
    {% extends "base.html" %} {% block title %}Child Registration{% endblock %}
    {% block content %}
    <div class="max-w-md mx-auto px-4 py-16">
      <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">
        Create Children Account
      </h1>

      {% for error in errors %}
      <p class="bg-red-50 text-red-700 text-sm px-4 py-2 rounded-md mb-2">
        {{ error }}
      </p>
      {% endfor %}

      <form
        method="POST"
        class="bg-white border border-gray-200 rounded-lg p-6 shadow-sm space-y-4"
      >
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Full Name</label
          >
          <input
            type="text"
            name="full_name"
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Username</label
          >
          <input
            type="text"
            name="username"
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Parent's Phone Number</label
          >
          <input
            type="text"
            name="parent_phone"
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Password</label
          >
          <input
            type="password"
            name="password"
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Confirm Password</label
          >
          <input
            type="password"
            name="confirm_password"
            class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 text-white font-medium py-2 rounded-md hover:bg-blue-700"
        >
          Register
        </button>
      </form>
    </div>
    {% endblock %}
  </body>
</html>
